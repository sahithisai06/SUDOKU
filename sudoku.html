<!DOCTYPE html>

    <title>

    <style>
      body{
        font-family:Arial, Helvetica, sans-serif;
        display:flex;
        flex-direction: column;
        align-items: center;
        justify-content:center;
        height:100vh;
        background-color:#e9e9e9;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        border: 3px solid black;
        justify-content: center;
        gap:2px;
      }
      .block{
        display: grid;
        grid-template-columns: repeat(3,1fr);
        grid-template-rows: repeat(3,1fr);
        border:2px solid black;
      }
      .cell{
       display:flex;
       justify-content: center;
       text-align: center;
       aspect-ratio: 1 / 1;
       font-size: 10px;
       font-size: 20px;
       line-height: 40px;
       width: 50px;
       height: 50px;
       border: 1px solid black;
       background-color: white;
      }
      .cell:hover{
        background-color:#e9e9e9 ;
      }
      input {
      width: 100%;
      height: 100%;
      border: none;
      text-align: center;
      font-size: 20px;
      box-sizing: border-box;
}
    </style>
